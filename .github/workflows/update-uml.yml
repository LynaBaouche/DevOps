name: Update UML Diagram

on:
  push:
    branches:
      - master
    paths:
      - 'backend/src/main/java/**'
      - 'backend/build.gradle'
      - 'doc/diagram_model.puml'
      - '.github/workflows/update-uml.yml'

permissions:
  contents: write

jobs:
  generate-uml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew

      # Génère le fichier texte .puml
      - name: Generate UML Diagram (.puml)
        working-directory: ./backend
        run: ./gradlew buildClassDiagram

      # 🚀 SOLUTION : On installe directement PlantUML sur la machine
      - name: Install PlantUML & Graphviz
        run: sudo apt-get update && sudo apt-get install -y plantuml graphviz

      # 🎨 On demande à PlantUML de dessiner le fichier .png
      - name: Convert PUML to PNG
        run: plantuml -tpng doc/diagram_model.puml

      # On commit les deux fichiers (le code .puml et le dessin .png)
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Update UML diagram & image automatically 🤖"
          file_pattern: 'doc/diagram_model.puml doc/*.png'